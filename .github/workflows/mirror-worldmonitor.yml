name: Mirror World Monitor upstream

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream branch, tag, or reachable commit
        required: false
        default: main
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - docs/adoptions/WORLDMONITOR_MIRROR_TRIGGER.md
  push:
    branches: [main]
    paths:
      - .github/workflows/mirror-worldmonitor.yml
      - registries/repos/worldmonitor.json
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: mirror-worldmonitor-upstream
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: koala73/worldmonitor
  DESTINATION_BRANCH: vendor/worldmonitor-main

jobs:
  mirror:
    if: >-
      github.event_name != 'pull_request' ||
      (github.actor == github.repository_owner &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve requested ref
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ github.event.inputs.upstream_ref || 'main' }}"
          if [[ ! "$requested" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Unsafe upstream ref: $requested" >&2
            exit 1
          fi
          echo "ref=$requested" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream source tree
        shell: bash
        run: |
          set -euo pipefail
          git init worldmonitor
          cd worldmonitor
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --depth 1 upstream "${{ steps.upstream.outputs.ref }}"
          git checkout --detach FETCH_HEAD

      - name: Verify identity, licence and clean tree
        working-directory: worldmonitor
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f LICENSE
          grep -q "World Monitor" README.md
          grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE
          test -z "$(git status --porcelain=v1 --untracked-files=no)"
          echo "UPSTREAM_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "UPSTREAM_TREE=$(git rev-parse 'HEAD^{tree}')" >> "$GITHUB_ENV"
          echo "UPSTREAM_COMMIT_DATE=$(git show -s --format=%cI HEAD)" >> "$GITHUB_ENV"

      - name: Build security-sanitised vendor tree
        working-directory: worldmonitor
        shell: bash
        run: |
          set -euo pipefail

          workflow_count=0
          if [[ -d .github/workflows ]]; then
            workflow_count=$(find .github/workflows -type f | wc -l | tr -d ' ')
            git mv .github/workflows .github/upstream-workflows-disabled
          fi

          cat > .worldmonitor-upstream.json <<EOF
          {
            "repository": "${UPSTREAM_REPOSITORY}",
            "ref": "${{ steps.upstream.outputs.ref }}",
            "commit": "${UPSTREAM_SHA}",
            "tree": "${UPSTREAM_TREE}",
            "commitDate": "${UPSTREAM_COMMIT_DATE}",
            "relocatedWorkflowFiles": ${workflow_count},
            "workflowRestoreFrom": ".github/upstream-workflows-disabled",
            "workflowRestoreTo": ".github/workflows"
          }
          EOF

          cat > CAMZ_VENDOR_SNAPSHOT.md <<EOF
          # Camz vendor snapshot

          This branch contains the World Monitor source tree from upstream commit
          \\`${UPSTREAM_SHA}\` (tree \\`${UPSTREAM_TREE}\`).

          GitHub rejected a verbatim push because the connected GitHub App does not
          have the special permission required to create files under
          \\`.github/workflows\`. The ${workflow_count} upstream workflow files are
          preserved byte-for-byte under \\`.github/upstream-workflows-disabled\`.
          Runtime and application source paths are otherwise unchanged.

          For local-only CI parity, copy that directory back to
          \\`.github/workflows\` after cloning. Do not commit the restored path through
          the connected App unless it is later granted workflow-write permission.
          EOF

          git add -A
          echo "VENDOR_TREE=$(git write-tree)" >> "$GITHUB_ENV"
          echo "RELOCATED_WORKFLOW_COUNT=${workflow_count}" >> "$GITHUB_ENV"

      - name: Create deterministic parentless vendor snapshot
        working-directory: worldmonitor
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          message=$(cat <<EOF
          vendor(worldmonitor): mirror ${UPSTREAM_SHA}

          Upstream-Repository: ${UPSTREAM_REPOSITORY}
          Upstream-Ref: ${{ steps.upstream.outputs.ref }}
          Upstream-SHA: ${UPSTREAM_SHA}
          Upstream-Tree: ${UPSTREAM_TREE}
          Vendor-Tree: ${VENDOR_TREE}
          Relocated-Workflow-Files: ${RELOCATED_WORKFLOW_COUNT}
          EOF
          )
          mirror_commit=$(
            printf '%s\n' "$message" |
              GIT_AUTHOR_DATE="${UPSTREAM_COMMIT_DATE}" \
              GIT_COMMITTER_DATE="${UPSTREAM_COMMIT_DATE}" \
              git commit-tree "${VENDOR_TREE}"
          )
          echo "MIRROR_COMMIT=${mirror_commit}" >> "$GITHUB_ENV"

      - name: Push isolated vendor branch
        working-directory: worldmonitor
        shell: bash
        env:
          DESTINATION_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git remote add destination \
            "https://x-access-token:${DESTINATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push destination \
            "${MIRROR_COMMIT}:refs/heads/${DESTINATION_BRANCH}" \
            --force

      - name: Publish audit summary
        shell: bash
        run: |
          {
            echo "### World Monitor vendor snapshot updated"
            echo
            echo "- Upstream: \`${UPSTREAM_REPOSITORY}\`"
            echo "- Requested ref: \`${{ steps.upstream.outputs.ref }}\`"
            echo "- Upstream commit: \`${UPSTREAM_SHA}\`"
            echo "- Original upstream tree: \`${UPSTREAM_TREE}\`"
            echo "- Sanitised vendor tree: \`${VENDOR_TREE}\`"
            echo "- Relocated workflow files: \`${RELOCATED_WORKFLOW_COUNT}\`"
            echo "- Vendor snapshot commit: \`${MIRROR_COMMIT}\`"
            echo "- Destination: \`${GITHUB_REPOSITORY}:${DESTINATION_BRANCH}\`"
            echo "- Protected scope: this workflow never modifies \`main\` or \`camz/*\`."
          } >> "$GITHUB_STEP_SUMMARY"
