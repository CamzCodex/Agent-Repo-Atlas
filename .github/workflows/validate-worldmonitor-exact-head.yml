name: Validate World Monitor exact head

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - docs/adoptions/WORLDMONITOR_EXACT_HEAD_VALIDATE_TRIGGER.md

permissions:
  contents: read

concurrency:
  group: validate-worldmonitor-exact-head
  cancel-in-progress: true

jobs:
  validate:
    if: >-
      github.actor == github.repository_owner &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out validation marker
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: trigger
          fetch-depth: 1
          show-progress: false
          persist-credentials: false

      - name: Read and validate target contract
        id: target
        shell: bash
        run: |
          set -euo pipefail
          marker=trigger/docs/adoptions/WORLDMONITOR_EXACT_HEAD_VALIDATE_TRIGGER.md
          target=$(sed -n 's/^Target-Branch: `\([^`]*\)`$/\1/p' "$marker")
          base=$(sed -n 's/^Base-Branch: `\([^`]*\)`$/\1/p' "$marker")
          expected=$(sed -n 's/^Expected-Head: `\([0-9a-f]\{40\}\)`$/\1/p' "$marker")
          test -n "$target" && test -n "$base" && test -n "$expected"
          [[ "$target" =~ ^(camz|fix)/[A-Za-z0-9._/-]+$ ]]
          [[ "$base" =~ ^(vendor|camz|fix)/[A-Za-z0-9._/-]+$ ]]
          git check-ref-format --branch "$target"
          git check-ref-format --branch "$base"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "expected=$expected" >> "$GITHUB_OUTPUT"

      - name: Check out exact target branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.target.outputs.target }}
          path: target
          fetch-depth: 0
          show-progress: false
          persist-credentials: false

      - name: Use repository Node version
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: target/.nvmrc
          cache: npm
          cache-dependency-path: target/package-lock.json

      - name: Verify exact target, ancestry, and whitespace
        working-directory: target
        shell: bash
        env:
          TARGET_BRANCH: ${{ steps.target.outputs.target }}
          BASE_BRANCH: ${{ steps.target.outputs.base }}
          EXPECTED_HEAD: ${{ steps.target.outputs.expected }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          git fetch origin "$BASE_BRANCH"
          git merge-base --is-ancestor "origin/$BASE_BRANCH" HEAD
          git diff --check "origin/$BASE_BRANCH"...HEAD

      - name: Install locked dependencies
        working-directory: target
        run: npm ci --ignore-scripts --prefer-offline --silent

      - name: Run secret-safe diagnostics
        working-directory: target
        run: npm run camz:diagnostics -- --strict

      - name: Check changed source, tests, and registers
        working-directory: target
        shell: bash
        env:
          BASE_BRANCH: ${{ steps.target.outputs.base }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(
            git diff --name-only --diff-filter=ACMR -z "origin/$BASE_BRANCH"...HEAD -- \
              '*.ts' '*.tsx' '*.mts' '*.mjs' '*.cjs' '*.json'
          )
          if ((${#files[@]})); then
            npx biome check -- "${files[@]}"
          fi

      - name: Run focused trust contracts
        working-directory: target
        run: >-
          npx tsx --test
          tests/asx-market-hours.test.mjs
          tests/asx-market-hours-browser-parity.test.mts
          tests/finance-observation-provenance.test.mts
          tests/circuit-breaker.test.mts
          tests/market-data-state.test.mts
          tests/market-fetch-data-state-wiring.test.mts
          tests/australia-market-desk.test.mts
          tests/australia-macro-context.test.mts
          tests/australia-market-context-export.test.mts
          tests/australia-mission-extension.test.mts
          tests/macro-tiles-china-ui.test.mts
          tests/australia-adversarial-v4.test.mts
          tests/clipboard.test.mts
          tests/latest-request-gate.test.mts

      - name: Validate governance documents and registers
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          npx markdownlint-cli2 \
            CURRENT_STATE_AUDIT.md \
            WORLDMONITOR_REUSE_AND_EXTENSION_MAP.md \
            WORLDMONITOR_STOCK_INTEGRATION_GAP_REGISTER.md \
            ADR-WORLDMONITOR-STOCK-INTEGRATION.md \
            WORLDMONITOR_IMPLEMENTATION_ROADMAP.md \
            WORLDMONITOR_PROVIDER_REGISTER.md \
            WORLDMONITOR_DATA_RIGHTS_REGISTER.md \
            WORLDMONITOR_CONTEXT_SCHEMA.md \
            WORLDMONITOR_SECURITY_THREAT_MODEL.md \
            WORLDMONITOR_TEST_AND_EVALUATION_PLAN.md \
            WORLDMONITOR_OPERATIONS_RUNBOOK.md \
            WORLDMONITOR_RECOMMENDATION_INTEGRATION_POLICY.md
          jq empty \
            providers.json datasets.json integration-contracts.json \
            implementation-work-packages.json risks.json decisions.json

      - name: Restore preserved upstream workflows
        working-directory: target
        run: |
          npm run camz:restore-workflows
          git add -A .github/workflows

      - name: Install locked blog dependencies
        working-directory: target/blog-site
        run: npm ci --ignore-scripts --prefer-offline --silent

      - name: Build complete full dashboard
        working-directory: target
        run: npm run build:full

      - name: Run complete upstream test suite
        working-directory: target
        run: npm run test:data

      - name: Type-check browser application
        working-directory: target
        run: npm run typecheck

      - name: Build Finance production variant
        working-directory: target
        run: npm run build:finance

      - name: Publish exact-head evidence
        if: always()
        shell: bash
        env:
          TARGET_BRANCH: ${{ steps.target.outputs.target }}
          BASE_BRANCH: ${{ steps.target.outputs.base }}
          EXPECTED_HEAD: ${{ steps.target.outputs.expected }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo '## World Monitor exact-head validation'
            echo
            echo "- Target branch: \`${TARGET_BRANCH:-unresolved}\`"
            echo "- Base branch: \`${BASE_BRANCH:-unresolved}\`"
            echo "- Expected head: \`${EXPECTED_HEAD:-unresolved}\`"
            echo "- Job status: **${JOB_STATUS}**"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
