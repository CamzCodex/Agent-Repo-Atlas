name: Validate Camz World Monitor enhancement

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - docs/adoptions/WORLDMONITOR_VALIDATE_TRIGGER.md

permissions:
  contents: read

concurrency:
  group: validate-worldmonitor-camz
  cancel-in-progress: true

jobs:
  validate:
    if: >-
      github.event_name != 'pull_request' ||
      (github.actor == github.repository_owner &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out the Camz enhancement branch
        uses: actions/checkout@v4
        with:
          ref: camz/local-foundation
          fetch-depth: 1
          show-progress: false

      - name: Use repository Node version
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --prefer-offline --silent

      - name: Run secret-safe local diagnostics
        run: npm run camz:diagnostics -- --strict

      - name: Check modified files with Biome
        run: >-
          npx biome check
          scripts/shared/asx-market-hours.cjs
          scripts/camz-local-diagnostics.mjs
          scripts/camz-restore-upstream-workflows.mjs
          src/shared/finance-observation-provenance.ts
          tests/asx-market-hours.test.mjs
          tests/finance-observation-provenance.test.mts
          tests/camz-local-diagnostics.test.mjs

      - name: Run focused Camz foundation tests
        run: npm run test:camz-foundation

      - name: Restore preserved upstream workflows for CI parity
        run: |
          npm run camz:restore-workflows
          git add -A .github/workflows

      - name: Build full dashboard artifacts for built-output tests
        run: VITE_VARIANT=full ./node_modules/.bin/vite build

      - name: Run upstream unit and integration suite
        id: upstream_suite
        shell: bash
        run: |
          set +e
          log="$RUNNER_TEMP/worldmonitor-test-data.log"
          npm run test:data > "$log" 2>&1
          status=$?
          export SUITE_STATUS="$status"
          export SUITE_LOG="$log"
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          ansi = re.compile(r'\x1b(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])')
          status = os.environ['SUITE_STATUS']
          raw_lines = Path(os.environ['SUITE_LOG']).read_text(encoding='utf-8', errors='replace').splitlines()
          lines = [ansi.sub('', line) for line in raw_lines]
          failures = []
          for line in lines:
              match = re.match(r'^\s*not ok\s+\d+\s+-\s+(.+?)\s*$', line)
              if match:
                  failures.append(match.group(1))
                  continue
              match = re.match(r'^\s*[✖×]\s+(.+?)\s*$', line)
              if match:
                  failures.append(match.group(1))
          if failures:
              summary = ' | '.join(dict.fromkeys(failures[:3]))
          else:
              candidates = [
                  line.strip()
                  for line in lines
                  if 'ERR_' in line or re.search(r'\berror\s*:', line, re.IGNORECASE)
              ]
              summary = candidates[-1] if candidates else f'exit {status}; no failure name found'
          summary = re.sub(r'\s+', ' ', summary).strip()[:220]
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'status={status}\n')
              output.write(f'summary={summary}\n')
          PY
          exit 0

      - name: "Enhancement suite failed — ${{ steps.upstream_suite.outputs.summary }}"
        if: steps.upstream_suite.outputs.status != '0'
        shell: bash
        run: |
          tail -n 180 "$RUNNER_TEMP/worldmonitor-test-data.log"
          exit 1

      - name: Upstream suite passed on enhancement branch
        if: steps.upstream_suite.outputs.status == '0'
        shell: bash
        run: tail -n 25 "$RUNNER_TEMP/worldmonitor-test-data.log"

      - name: Type-check the browser application
        if: steps.upstream_suite.outputs.status == '0'
        run: npm run typecheck

      - name: Build the finance variant
        if: steps.upstream_suite.outputs.status == '0'
        run: npm run build:finance
